<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="8 · 12 · 16 · 22 · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); }
  .row { display: flex; gap: 18px; padding: 24px; align-items: center; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 70px; height: 56px; background: var(--green-100); border: 1px solid var(--green-300); }
  .n { font-size: 11px; color: var(--ink-500); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm · 8</span></div>
    <div class="u"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">md · 12</span></div>
    <div class="u"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg · 16</span></div>
    <div class="u"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl · 22</span></div>
    <div class="u"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="n">pill</span></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); }

  h4 { margin:0 0 6px; font-size:16px; font-weight:700; color:var(--ink-900); }
  p { margin:0; font-size:13px; line-height:1.5; color:var(--ink-500); }
</style>
</head>
<body>
  <div class="wrap">
    <img src="../assets/illustration-mountain-river.png" alt="Mountain and river" style="height:200px" />
    <div class="txt">
      <h4>Flat, layered, vibrant</h4>
      <p>Hiku's illustrations are flat vector landscapes in the brand greens with a single warm bird or figure. Used for empty states, onboarding and community headers — never photographic, never gradient-heavy.</p>
    </div>
  </div>

</html>

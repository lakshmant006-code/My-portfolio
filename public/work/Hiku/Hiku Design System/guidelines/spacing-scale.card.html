<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); }
  .row { display: flex; align-items: flex-end; gap: 16px; padding: 24px; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--green-400); border-radius: 4px; width: 100%; }
  .n { font-size: 11px; color: var(--ink-500); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="u" style="width:4px"><div class="box" style="height:4px"></div><span class="n">1</span></div>
    <div class="u" style="width:8px"><div class="box" style="height:8px"></div><span class="n">2</span></div>
    <div class="u" style="width:12px"><div class="box" style="height:12px"></div><span class="n">3</span></div>
    <div class="u" style="width:16px"><div class="box" style="height:16px"></div><span class="n">4</span></div>
    <div class="u" style="width:20px"><div class="box" style="height:20px"></div><span class="n">5</span></div>
    <div class="u" style="width:24px"><div class="box" style="height:24px"></div><span class="n">6</span></div>
    <div class="u" style="width:32px"><div class="box" style="height:32px"></div><span class="n">8</span></div>
    <div class="u" style="width:48px"><div class="box" style="height:48px"></div><span class="n">12</span></div>
  </div>
</body>
</html>

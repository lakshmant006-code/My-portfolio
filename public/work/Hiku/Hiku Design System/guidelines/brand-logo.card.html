<!-- @dsCard group="Brand" viewport="700x180" name="Logo & Mark" subtitle="Green mountain mark + Satoshi-Black wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); }
  .row { display: flex; align-items: center; gap: 40px; padding: 26px 30px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .band { display:flex; align-items:flex-end; padding:0 16px 12px; height:78px; background:var(--green-300); border-radius:12px; }
  .lbl { font-size:11px; color:var(--ink-500); font-weight:500; }
  .wm { font-weight:900; font-size:40px; letter-spacing:-.02em; color:var(--green-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><img src="../assets/logo-mark.png" alt="Hiku" style="height:52px" /><span class="lbl">mark</span></div>
    <div class="cell"><span class="wm">Hiku</span><span class="lbl">wordmark · Satoshi Black</span></div>
    <div class="cell"><div class="band"><img src="../assets/logo-mark.png" alt="Hiku" style="height:34px" /></div><span class="lbl">on header band</span></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); color: var(--ink-900); }
  .row { display: flex; gap: 8px; padding: 22px; flex-wrap: wrap; }
  .w { flex: 1; min-width: 90px; }
  .big { font-size: 40px; line-height: 1; }
  .lbl { margin-top: 8px; font-size: 11px; color: var(--ink-500); font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="w"><div class="big" style="font-weight:300">Aa</div><div class="lbl">Light · 300</div></div>
    <div class="w"><div class="big" style="font-weight:400">Aa</div><div class="lbl">Regular · 400</div></div>
    <div class="w"><div class="big" style="font-weight:500">Aa</div><div class="lbl">Medium · 500</div></div>
    <div class="w"><div class="big" style="font-weight:700">Aa</div><div class="lbl">Bold · 700</div></div>
    <div class="w"><div class="big" style="font-weight:900">Aa</div><div class="lbl">Black · 900</div></div>
    <div class="w"><div class="big" style="font-weight:400;font-style:italic">Aa</div><div class="lbl">Italic · 400</div></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--white); }
  .row { display: flex; gap: 10px; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; }
  .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.05); }
  .name { margin-top: 8px; font-size: 12px; font-weight: 700; color: var(--ink-900); }
  .hex { font-size: 11px; color: var(--ink-500); font-weight: 500; }
  .src { font-size: 10px; color: var(--green-500); font-weight: 700; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green-100)"></div><span class="name">green-100</span><span class="hex">#d9ede1</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-200)"></div><span class="name">green-200</span><span class="hex">#b9dfc9</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-300)"></div><span class="name">green-300</span><span class="hex">#8dcaaf</span><span class="src">SOURCE</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-400)"></div><span class="name">green-400</span><span class="hex">#4fb889</span><span class="src">SOURCE</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-500)"></div><span class="name">green-500</span><span class="hex">#349369</span><span class="src">SOURCE</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-600)"></div><span class="name">green-600</span><span class="hex">#2b7c58</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-700)"></div><span class="name">green-700</span><span class="hex">#216044</span></div>
  </div>
</body>
</html>

<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="Soft, neutral shadows — never colored" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-100); }
  .row { display: flex; gap: 26px; padding: 30px; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 92px; height: 60px; background: var(--white); border-radius: 12px; }
  .n { font-size: 11px; color: var(--ink-500); font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
    <div class="u"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="n">card</span></div>
    <div class="u"><div class="box" style="box-shadow:var(--shadow-float)"></div><span class="n">float · FAB</span></div>
  </div>
</body>
</html>

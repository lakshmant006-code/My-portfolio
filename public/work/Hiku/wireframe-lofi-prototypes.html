<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Lo-Fi Wireframes – Hiking App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #d9d9d9;
    font-family: sans-serif;
    padding: 24px;
    min-height: 100vh;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid #bbb;
    background: #f0f0f0;
    cursor: pointer;
    font-size: 12px;
    color: #555;
  }
  .tab-btn.active { background: #555555; color: #fff; border-color: #555555; }

  /* ── Phone shell ── */
  .phone-wrap {
    display: flex;
    justify-content: center;
  }
  .phone {
    width: 320px;
    background: #fff;
    border-radius: 28px;
    border: 2px solid #bbb;
    overflow: hidden;
    display: none;
    flex-direction: column;
    min-height: 580px;
  }
  .phone.active { display: flex; }

  /* ── Shared ── */
  .bar { border-radius: 3px; background: #ccc; display: block; }

  /* Header band */
  .header-band {
    background: #e0e0e0;
    padding: 14px 14px 10px;
    flex-shrink: 0;
  }
  .header-logo {
    width: 40px; height: 28px;
    background: #cccccc;
    border-radius: 4px;
    margin: 0 auto 10px;
  }

  /* Search bar */
  .search-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
  }
  .search-box {
    flex: 1; height: 28px;
    border: 1.5px solid #bbb; border-radius: 5px;
    background: #fff;
    display: flex; align-items: center; padding-left: 8px; gap: 6px;
  }
  .search-icon { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #bbb; flex-shrink: 0; }
  .search-text { height: 8px; background: #d4d4d4; border-radius: 2px; flex: 1; }
  .filter-btn { width: 28px; height: 28px; border: 1.5px solid #bbb; border-radius: 5px; background: #fff; flex-shrink: 0; }

  /* Filter chips */
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    height: 22px; padding: 0 10px;
    border: 1.5px solid #bbb; border-radius: 11px;
    background: #fff;
    display: flex; align-items: center; gap: 4px;
  }
  .chip-text { height: 7px; width: 50px; background: #ccc; border-radius: 2px; }
  .chip-arrow { width: 6px; height: 6px; background: #bbb; border-radius: 1px; }

  /* Body scroll area */
  .body { flex: 1; overflow: hidden; padding: 0; }

  /* Image placeholder */
  .img-ph {
    width: 100%; background: #d4d4d4;
    position: relative; overflow: hidden;
  }
  .img-ph svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* Result count bar */
  .result-count { height: 8px; width: 60px; background: #ccc; border-radius: 2px; margin: 10px 14px 8px; }

  /* Caption bar */
  .caption { height: 9px; width: 90px; background: #bbb; border-radius: 2px; margin: 6px auto; }

  /* List items */
  .list-item {
    display: flex; align-items: center; gap: 10px;
    border: 1.5px solid #ddd; border-radius: 8px;
    margin: 6px 14px; padding: 10px 12px;
    background: #fafafa;
  }
  .list-icon { width: 28px; height: 28px; background: #d4d4d4; border-radius: 4px; flex-shrink: 0; }
  .list-text { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .list-title { height: 9px; background: #bbb; border-radius: 2px; width: 80%; }
  .list-sub { height: 7px; background: #ddd; border-radius: 2px; width: 65%; }

  /* Bottom action row */
  .bottom-action {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px 12px;
    border-top: 1px solid #eee;
  }
  .clear-btn { height: 8px; width: 30px; background: #bbb; border-radius: 2px; }
  .show-btn { height: 28px; width: 100px; background: #555555; border-radius: 6px; }

  /* Bottom nav */
  .bottom-nav {
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 10px;
    border-top: 1px solid #e0e0e0;
    background: #fff;
    flex-shrink: 0;
  }
  .nav-item-b { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .nav-icon-b { width: 16px; height: 16px; background: #d0d0d0; border-radius: 3px; }
  .nav-icon-b.active { background: #555555; }
  .nav-label-b { height: 6px; width: 28px; background: #d8d8d8; border-radius: 2px; }
  .nav-label-b.active { background: #555555; }

  /* ── MAP screen ── */
  .map-area {
    flex: 1; background: #ebebeb; position: relative; overflow: hidden;
  }
  .map-grid-h {
    position: absolute; width: 100%; border-top: 1px solid #ccc;
  }
  .map-grid-v {
    position: absolute; height: 100%; border-left: 1px solid #ccc;
  }
  .map-road {
    position: absolute; background: #cccccc;
    border-radius: 4px;
  }
  .map-pin {
    position: absolute; width: 10px; height: 10px;
    background: #555555; border-radius: 50%;
  }
  .map-compass {
    position: absolute; right: 12px; bottom: 12px;
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid #bbb; background: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .map-compass-inner { width: 8px; height: 8px; background: #ccc; border-radius: 1px; transform: rotate(45deg); }

  /* ── SPLASH / ONBOARDING ── */
  .splash-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    background: #fff;
  }
  .splash-logo { width: 70px; height: 50px; background: #e0e0e0; border-radius: 10px; margin-bottom: 14px; }

  /* ── REGISTRATION ── */
  .reg-hero { width: 100%; height: 160px; background: #e0e0e0; position: relative; }
  .back-circle {
    position: absolute; top: 10px; left: 10px;
    width: 26px; height: 26px; border-radius: 50%;
    background: rgba(255,255,255,0.7);
  }
  .reg-body { padding: 14px; flex: 1; }
  .reg-title { height: 12px; width: 130px; background: #bbb; border-radius: 3px; margin-bottom: 16px; }
  .reg-field { height: 32px; border: 1.5px solid #d0d0d0; border-radius: 6px; background: #fafafa; margin-bottom: 10px; }
  .reg-btn { height: 36px; background: #555555; border-radius: 8px; margin-top: 8px; }

  /* ── SHOP ── */
  .product-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 10px 14px;
  }
  .product-card { display: flex; flex-direction: column; gap: 6px; }
  .product-img { width: 100%; height: 80px; background: #e0e0e0; border-radius: 6px; }
  .product-title { height: 7px; background: #bbb; border-radius: 2px; width: 90%; }
  .product-price { height: 7px; background: #ccc; border-radius: 2px; width: 40%; }

  /* ── COMMUNITY ── */
  .community-card {
    margin: 10px 14px 0;
    border: 1.5px solid #ddd; border-radius: 8px;
    overflow: hidden; background: #fafafa;
  }
  .community-img { width: 100%; height: 90px; background: #e0e0e0; }
  .community-body { padding: 10px; }
  .community-title { height: 10px; width: 130px; background: #bbb; border-radius: 3px; margin-bottom: 8px; }
  .community-line { height: 7px; background: #e0e0e0; border-radius: 2px; margin-bottom: 5px; }
  .community-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .join-btn { height: 26px; width: 70px; background: #555555; border-radius: 5px; }
  .know-link { height: 8px; width: 50px; background: #d4d4d4; border-radius: 2px; }

  .community-card-sm {
    margin: 8px 14px 0;
    border: 1.5px solid #ddd; border-radius: 8px;
    overflow: hidden; background: #fafafa;
  }
  .community-img-sm { width: 100%; height: 60px; background: #e0e0e0; }
  .community-body-sm { padding: 8px; }
  .community-title-sm { height: 9px; width: 110px; background: #bbb; border-radius: 3px; }
</style>

<script>
  function showTab(name, btn) {
    document.querySelectorAll('.phone').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('phone-' + name).classList.add('active');
    btn.classList.add('active');
  }
</script>
